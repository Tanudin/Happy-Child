name: Build and upload app
on:
  push:
    branches:
      - main
    paths:
      - ./app-version.js
      - .github/workflows/release-app.yml
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v3

      - name: 🏗 Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20.x
 
      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm i

      - name: 🚀 Build and submit app (only support iOS for now)
        run: eas build --platform ios --non-interactive --auto-submit --no-wait

